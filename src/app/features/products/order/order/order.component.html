<div class="title-container">

  <h2 class="super-title">
    Request Order
    <span class="spark s1"></span>
    <span class="spark s2"></span>
    <span class="spark s3"></span>
  </h2>

</div>


<div class="w-9/12 mx-auto">
  <form [formGroup]="addressForm" class="my-4" (ngSubmit)="checkout()">
    <div class="mb-6">
      <label class="text-green-700 block mb-2.5 text-sm font-medium">Details : </label>
      <input formControlName="details" type="text"
        class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-green-600 focus:border-green-600 block w-full px-3 py-2.5 shadow-xs placeholder:text-body" />
    </div>



    <div class="mb-6">
      <label class="text-green-700 block mb-2.5 text-sm font-medium">Phone Number : </label>
      <input formControlName="phone" type="tel"
        class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-green-600 focus:border-green-600 block w-full px-3 py-2.5 shadow-xs placeholder:text-body" />
    </div>
    <div class="mb-6">
      <label class="text-green-700 block mb-2.5 text-sm font-medium">City : </label>
      <input formControlName="city" type="text"
        class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-green-600 focus:border-green-600 block w-full px-3 py-2.5 shadow-xs placeholder:text-body" />
    </div>


    <button [disabled]="!addressForm.valid"
      class="disabled:bg-green-300 disabled:cursor-not-allowed p-2 rounded text-white bg-green-600 cursor-pointer hover:bg-green-700 transition-all duration-300 ease-in-out "
      type="submit">Checkout
    </button>


  </form>
</div>
