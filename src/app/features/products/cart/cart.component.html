<div class="title-container">

  <h2 class="super-title">
    My Cart
    <span class="spark s1"></span>
    <span class="spark s2"></span>
    <span class="spark s3"></span>
  </h2>

</div>

<div class="flex mb-4 w-full">
  <button (click)="clearCart()" class="mx-auto px-4 py-2 font-medium text-body bg-white-medium border border-red-500
           rounded-md hover:bg-red-600 hover:text-white transition-colors duration-500 cursor-pointer">
    Clear Cart
  </button>
</div>

<div class="relative overflow-x-auto shadow-xs w-[75%] mx-auto rounded-base border border-default mb-6">
  <table class="w-full text-sm text-left rtl:text-right text-body">
    <thead class="text-sm text-body bg-neutral-secondary-medium border-b border-default-medium">
      <tr>
        <th scope="col" class="px-16 py-3">
          <span class="sr-only">Image</span>
        </th>
        <th scope="col" class="px-6 py-3 font-medium text-center">
          Product
        </th>
        <th scope="col" class="px-6 py-3 font-medium text-center">
          Qty
        </th>
        <th scope="col" class="px-6 py-3 font-medium text-center">
          Price
        </th>
        <th scope="col" class="px-6 py-3 font-medium text-center">
          Action
        </th>
      </tr>
    </thead>
    <tbody>
      @for (item of allCartProdycts(); track item._id) {
      <tr class="bg-neutral-primary-soft border-b border-default hover:bg-neutral-secondary-medium">
        <td class="p-4">
          <img [src]="item.product.imageCover"
            class="w-16 md:w-24 max-w-full max-h-full transition-transform duration-300 hover:scale-110"
            alt="Apple Watch">
        </td>
        <td class="px-6 py-4 font-semibold text-heading text-center">
          {{item.product.title}}
        </td>
        <td class="px-6 py-4 text-center">
          <form class="max-w-xs mx-auto">
            <label for="counter-input-1" class="sr-only">Choose quantity:</label>
            <div class="relative flex items-center justify-center gap-2">
              <button type="button" id="decrement-button-1" data-input-counter-decrement="counter-input-1"
                class="flex items-center justify-center text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-green-600 hover:text-white cursor-pointer rounded-full text-sm h-6 w-6 transition-colors duration-500">
                <svg (click)="updateCount(item.count - 1 , item.product._id)" class="w-3 h-3" aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M5 12h14" />
                </svg>
              </button>
              <input readonly type="text" id="counter-input-1" data-input-counter
                class="shrink-0 text-heading border-0 bg-transparent text-sm font-normal focus:outline-none focus:ring-0 max-w-[2.5rem] text-center"
                [value]="item.count" required />
              <button type="button" id="increment-button-1" data-input-counter-increment="counter-input-1"
                class="flex items-center justify-center text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-green-600 hover:text-white cursor-pointer rounded-full text-sm h-6 w-6 transition-colors duration-500">
                <svg (click)="updateCount(item.count + 1 , item.product._id)" class="w-3 h-3" aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M5 12h14m-7 7V5" />
                </svg>
              </button>
            </div>
          </form>
        </td>
        <td class="px-6 py-4 font-semibold text-heading text-center">
          {{item.price * item.count}} EGP
        </td>
        <td class="px-6 py-4 text-center">
          <a (click)="removeItem(item.product._id)"
            class="inline-block px-3 py-1 font-medium text-body bg-neutral-secondary-medium rounded-md border border-red-500 hover:bg-red-600 hover:text-white transition-colors duration-500 cursor-pointer">
            Remove
          </a>
        </td>
      </tr>
      }
    </tbody>
  </table>
</div>
<!-- Total Price Card with animation -->
<div class="relative overflow-x-auto shadow-xs rounded-base border border-default mt-4 mb-6 p-4 sm:p-6 max-w-md mx-auto
         cursor-pointer transform transition-all duration-300 hover:scale-105 hover:shadow-lg">
  <div class="flex justify-between items-center">
    <span class="text-heading font-semibold text-body text-lg sm:text-xl">
      Total Price :
    </span>
    <span class="text-heading font-bold text-lg sm:text-xl">
      {{totalPrice()}} EGP
    </span>
  </div>
</div>
