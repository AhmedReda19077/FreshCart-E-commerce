

<div class="w-11/12 max-w-6xl my-12 mx-auto">
  <a class="flex flex-col items-center bg-white border border-gray-200 rounded-xl shadow-md md:flex-row
    hover:shadow-xl hover:scale-[1.02] transition-all duration-300 group overflow-hidden">

    <img
      class="object-contain w-full h-96 md:h-[420px] md:w-1/3 p-4
      group-hover:scale-105 transition-transform duration-500"
      [src]="product().imageCover"
      alt=""
    />

    <div class="flex flex-col justify-between p-8 leading-normal w-full">

      <h5 class="mb-3 text-3xl font-bold tracking-tight text-green-600">
        {{product().title}}
      </h5>

      <h6 class="mb-3 text-lg font-medium text-gray-500 line-clamp-3">
        {{product().description}}
      </h6>

      <span class="text-green-600 font-semibold mb-3 text-lg">
        {{product().category.name}}
      </span>

      <div class="flex items-center justify-between mt-4">

        <span class="font-bold text-2xl text-gray-800">
          {{product().price}} EGP
        </span>

        <div class="flex items-center gap-1">
          <svg class="w-5 h-5 text-yellow-400" fill="currentColor" viewBox="0 0 22 20">
            <path d="M20.924 7.625a1.523 1.523 0 0 0-1.238-1.044l-5.051-.734-2.259-4.577
              a1.534 1.534 0 0 0-2.752 0L7.365 5.847l-5.051.734A1.535 1.535 0 0 0
              1.463 9.2l3.656 3.563-.863 5.031a1.532 1.532 0 0 0
              2.226 1.616L11 17.033l4.518 2.375a1.534 1.534 0 0 0
              2.226-1.617l-.863-5.03L20.537 9.2a1.523 1.523 0 0 0 .387-1.575Z" />
          </svg>

          <span class="text-gray-600 font-medium">{{product().ratingsAverage}}</span>
        </div>

      </div>

      <button
        class="mt-6 w-fit text-white bg-green-600 hover:bg-green-700
        active:scale-95 transition-all duration-200
        font-medium rounded-lg text-sm px-7 py-3 shadow-md hover:shadow-lg">

        Add to cart
      </button>

    </div>

  </a>
</div>
